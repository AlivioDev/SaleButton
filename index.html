<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USB knop geluid test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>USB knop geluid test</h1>
      <section class="panel">
        <h2>Afspeelmodus</h2>
        <div class="mode-row">
          <label>
            <input type="radio" name="mode" value="fixed" id="modeFixed" />
            Vast geluid
          </label>
          <label>
            <input type="radio" name="mode" value="random" id="modeRandom" />
            Random
          </label>
        </div>

        <button id="playButton" type="button">Test huidige modus</button>
      </section>

      <section class="panel summary">
        <h2>Huidige status</h2>
        <p><strong>App status:</strong> <span id="appStatus" class="app-state">Actief</span></p>
        <p><strong>Opstarten met Windows:</strong> <span id="startupState">Nee</span></p>
        <p><strong>Modus:</strong> <span id="currentMode">-</span></p>
        <p><strong>Vast geluid:</strong> <span id="currentFixedSound">-</span></p>
        <p><strong>Aantal MP3-bestanden:</strong> <span id="soundCount">0</span></p>
      </section>

      <section class="panel" id="settingsPanel">
        <h2>Instellingen</h2>
        <label class="settings-toggle">
          <input id="startupToggle" type="checkbox" />
          Start Sale Button automatisch met Windows
        </label>
      </section>

      <section class="panel">
        <div class="library-header">
          <h2>Geluidsbibliotheek</h2>
          <div class="library-actions">
            <button id="addMp3Button" type="button">MP3 toevoegen</button>
            <button id="refreshButton" type="button" class="secondary">Vernieuwen</button>
          </div>
        </div>
        <p id="libraryMessage" class="library-message">Laden...</p>
        <div id="libraryList" class="library-grid"></div>
      </section>

      <p id="status" aria-live="polite">Klaar.</p>
      <audio id="soundPlayer" preload="auto"></audio>
      <input id="mp3FileInput" type="file" accept=".mp3,audio/mpeg" multiple hidden />
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
